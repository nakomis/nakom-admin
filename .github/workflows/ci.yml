name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Check out the post-merge state on PRs so CI validates what will land on main,
# not just the branch tip. Falls back to the commit SHA on push/workflow_dispatch.
env:
  CHECKOUT_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}

jobs:
  # ── Path-change detection ─────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - '.github/workflows/ci.yml'

  # ── TypeScript / CDK + Lambda ─────────────────────────────────────────────────
  infra:
    name: Infra (CDK / Lambda)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - name: Install dependencies
        working-directory: infra
        run: npm ci
      - name: Test
        working-directory: infra
        run: npm test

  # ── CDK synth (validates template on PRs and pushes) ─────────────────────────
  synth-infra:
    name: CDK synth
    runs-on: ubuntu-latest
    needs: [changes, infra]
    if: |
      (needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.infra.result == 'success'
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: CDK synth
        run: npm run ci-synth

  # ── React / Web ───────────────────────────────────────────────────────────────
  web:
    name: Web (React / Vite)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build

  # ── CI Status gate (always runs, allows skipped jobs) ─────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [infra, synth-infra, web]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.infra.result }}" == "failure" ]] || \
             [[ "${{ needs.synth-infra.result }}" == "failure" ]] || \
             [[ "${{ needs.web.result }}" == "failure" ]]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed or were skipped"
